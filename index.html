<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AcoustiQuiz 🌊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ┌──────────────────────────────────────────────────────────────┐
       │  FIXED HEADER — edit lines marked with ★                    │
       └──────────────────────────────────────────────────────────────┘ -->
  <header id="site-header">
    <div class="hdr-logos">
      <img src="assets/images/LMA.png"  class="hdr-logo" alt="Lab logo"         onerror="this.style.display='none'">  <!-- ★ -->
      <img src="assets/images/cnrs.png" class="hdr-logo" alt="Institution logo" onerror="this.style.display='none'">  <!-- ★ -->
    </div>
    <div class="hdr-center">
      <span class="hdr-appname">Learn by playing · Underwater Acoustics &amp; Bioacoustics</span>  <!-- ★ -->
      <span class="hdr-tagline">Fête de la Science 2026 &nbsp;·&nbsp; Laboratoire de Mécanique et d'Acoustique</span>  <!-- ★ -->
      <span class="hdr-credit">App created by Davide Bittelli</span>  <!-- ★ -->
    </div>
    <div class="hdr-controls">
      <button id="theme-btn" class="zoom-btn" onclick="App.toggleTheme()" title="Light / Dark mode">☀️</button>
      <button id="lang-btn"  class="lang-btn" onclick="App.toggleLang()">🇫🇷 FR</button>
      <div class="zoom-btns">
        <button class="zoom-btn" onclick="App.zoomOut()" title="Zoom out">−</button>
        <button class="zoom-btn" onclick="App.zoomIn()"  title="Zoom in">+</button>
      </div>
    </div>
  </header>

  <!-- Main render target -->
  <div id="app"></div>

  <!-- ┌──────────────────────────────────────────────────────────────┐
       │  FIXED FOOTER — EU / project funding strip                  │
       │  Place logos in assets/images/ — missing ones auto-hide     │
       └──────────────────────────────────────────────────────────────┘ -->
  <footer id="site-footer">
    <!-- "Funded by the European Union" logo — displayed on white pill (EU brand guidelines) -->
    <div class="eu-logo-wrap">
      <img src="assets/images/logo-eu.png" class="eu-logo" alt="Funded by the European Union"
           onerror="this.parentElement.style.display='none'">
    </div>
    <span class="ftr-divider"></span>
    <p class="ftr-text">
      Funded by the European Union's Horizon Europe — Marie Skłodowska-Curie Actions
      &nbsp;·&nbsp; <strong>SEASOUNDS</strong> (GA&nbsp;101119769)
      &nbsp;·&nbsp; <strong>BETTER</strong> (GA&nbsp;101169348)
    </p>
    <span class="ftr-divider"></span>
    <div class="ftr-project-logos">
      <img src="assets/images/logo-seasounds.png" class="ftr-logo" alt="SEASOUNDS" onerror="this.style.display='none'">
      <img src="assets/images/logo-better.png"    class="ftr-logo" alt="BETTER"   onerror="this.style.display='none'">
    </div>
  </footer>

  <!-- Deep-sea background -->
  <div class="seabed" aria-hidden="true">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="wave-row">
      <div class="wave w1"></div>
      <div class="wave w2"></div>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
