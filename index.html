<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OceanQuiz 🌊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ┌──────────────────────────────────────────────────────────────┐
       │  FIXED HEADER — edit the lines marked with ★                │
       └──────────────────────────────────────────────────────────────┘ -->
  <header id="site-header">

    <!-- ★ LEFT LOGOS — place files in assets/images/
         Missing images are hidden automatically (onerror)             -->
    <div class="hdr-logos">
      <img src="assets/images/LMA.png"
           class="hdr-logo" alt="Lab logo"
           onerror="this.style.display='none'">
      <img src="assets/images/cnrs.png"
           class="hdr-logo" alt="Institution logo"
           onerror="this.style.display='none'">
    </div>

    <!-- ★ CENTER — edit app name, occasion and credit -->
    <div class="hdr-center">
      <span class="hdr-appname">APP-Quiz · Underwater Acoustics</span>  <!-- ★ app name -->
      <span class="hdr-tagline">
        Fête de la Science 2026 &nbsp;·&nbsp; Laboratoire de Mécanique et d'Acoustique (LMA) <!-- ★ event & lab -->
      </span>
      <span class="hdr-credit">App created by Davide Bittelli</span>  
    </div>

    <!-- RIGHT — controls (no edit needed) -->
    <div class="hdr-controls">
      <button id="lang-btn" class="lang-btn" onclick="App.toggleLang()">🇫🇷 FR</button>
      <div class="zoom-btns">
        <button class="zoom-btn" onclick="App.zoomOut()" title="Zoom out">−</button>
        <button class="zoom-btn" onclick="App.zoomIn()"  title="Zoom in">+</button>
      </div>
    </div>

  </header>

  <!-- Main render target -->
  <div id="app"></div>

  <!-- Deep-sea background particles -->
  <div class="seabed" aria-hidden="true">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="wave-row">
      <div class="wave w1"></div>
      <div class="wave w2"></div>
    </div>
  </div>

  <!-- JS files (order matters) -->
  <script src="js/i18n.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
